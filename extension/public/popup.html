<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PropCheck</title>
    <style>
      :root {
        --cream: #faf9f5;
        --ink: #141413;
        --orange: #d97757;
        --subtle: #e8e6df;
        --safe: #10b981;
        --amber: #f59e0b;
        --risky: #ef4444;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 360px;
        min-height: 480px;
        background: var(--cream);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--subtle);
      }
      header .mark {
        width: 32px;
        height: 32px;
        background: var(--ink);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      header h1 {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      header .tagline {
        font-size: 11px;
        color: rgba(20, 20, 19, 0.6);
        margin-top: 2px;
      }
      main { padding: 16px 18px 20px; }
      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      label {
        font-size: 12px;
        font-weight: 600;
        color: rgba(20, 20, 19, 0.7);
      }
      input[type="url"] {
        width: 100%;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        padding: 10px 12px;
        border: 1px solid var(--subtle);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
      }
      input[type="url"]:focus {
        outline: 2px solid var(--orange);
        outline-offset: 1px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      button.primary {
        background: var(--ink);
        color: var(--cream);
        border: 0;
        padding: 10px 14px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      button.primary:hover { background: #000; }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--subtle);
        padding: 10px 14px;
        border-radius: 8px;
        font-weight: 500;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary:hover { background: #fff; }
      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
        color: rgba(20, 20, 19, 0.55);
        margin: 18px 0 8px;
      }
      ul.recents {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      ul.recents .empty {
        font-style: italic;
        color: rgba(20, 20, 19, 0.55);
        font-size: 12px;
      }
      .recent {
        background: #fff;
        border: 1px solid var(--subtle);
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
        width: 100%;
      }
      .recent:hover { border-color: var(--ink); }
      .recent .score {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-weight: 700;
        font-size: 14px;
        min-width: 26px;
        text-align: center;
        padding: 2px 4px;
        border-radius: 6px;
        color: #fff;
      }
      .recent .score[data-label="safe"] { background: var(--safe); }
      .recent .score[data-label="caution"] { background: var(--amber); }
      .recent .score[data-label="risky"] { background: var(--risky); }
      .recent .info {
        flex: 1;
        min-width: 0;
      }
      .recent .info .title {
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .recent .info .url {
        font-size: 11px;
        color: rgba(20, 20, 19, 0.55);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      footer {
        font-size: 11px;
        color: rgba(20, 20, 19, 0.55);
        padding: 12px 18px 16px;
        border-top: 1px solid var(--subtle);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 12l2 2 4-4"></path>
          <circle cx="12" cy="12" r="10"></circle>
        </svg>
      </span>
      <div>
        <h1>PropCheck</h1>
        <div class="tagline">Trust score for any property listing.</div>
      </div>
    </header>
    <main>
      <div class="field">
        <label for="url-input">Paste a property URL</label>
        <input id="url-input" type="url" placeholder="https://www.magicbricks.com/..." autocomplete="off" spellcheck="false" />
      </div>
      <div class="row">
        <button id="check-btn" class="primary">Check</button>
        <button id="open-home-btn" class="secondary">Open PropCheck</button>
      </div>
      <div class="section-title">Recent checks</div>
      <ul id="recent-list" class="recents">
        <li class="empty">No recent checks yet.</li>
      </ul>
    </main>
    <footer>
      We only send the URL you choose to PropCheck. Never page contents, history, or other tabs.
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
